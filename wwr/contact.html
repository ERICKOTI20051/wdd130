<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description" content="Contact White Water Rafting Company">
    <meta name="author" content="Erick Otieno">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/white-water-rafting-logo.png" alt="White Water Rafting Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <h1>Contact White Water Rafting</h1>

        <section class="company-info">
            <h2>Company Information</h2>

            <p><strong>Address:</strong> Nairobi CBD, Nairobi, Kenya</p>
            <p><strong>Phone:</strong> +254 743 916 004</p>
            <p><strong>Email:</strong> info@whitewater.com</p>
        </section>

        <section class="contact-content">

            <div class="map">
                <iframe src="https://www.google.com/maps?q=Nairobi+CBD,+Nairobi,+Kenya&output=embed"
                  width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <div class="contact-form">

                <form>

                    <fieldset>

                        <legend>Send Us a Message</legend>

                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" name="fullname" required>

                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>

                        <p>Purpose of Message</p>

                        <label>
                            <input type="radio" name="purpose" value="General Inquiry" checked>
                            General Inquiry
                        </label>

                        <label>
                            <input type="radio" name="purpose" value="Reservation Question">
                            Reservation Question
                        </label>

                        <label>
                            <input type="radio" name="purpose" value="Website Suggestion">
                            Website Suggestion
                        </label>

                        <label for="message">Message</label>

                        <textarea id="message" name="message" rows="6"></textarea>

                        <label>
                            <input type="checkbox" name="newsletter">
                            Please subscribe me to the monthly newsletter
                        </label>

                        <button type="submit">Get in Touch!</button>

                    </fieldset>

                </form>

            </div>

        </section>

        <section class="employees">

            <h2>Meet Our Team</h2>

            <div class="employee-profiles">

                <figure>
                    <img src="images/employee1.jpg" alt="John Kamau">
                    <figcaption>John Kamau<br>Senior River Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="Grace Achieng">
                    <figcaption>Grace Achieng<br>Customer Relations</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Brian Otieno">
                    <figcaption>Brian Otieno<br>Operations Manager</figcaption>
                </figure>

            </div>

        </section>

    </main>

    <footer>

        <p>&copy; 2026 White Water Rafting | Erick Otieno</p>

        <nav class="socialmedia">

            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram">
            </a>

            <a href="https://x.com">
                <img src="images/twitter.png" alt="X">
            </a>

        </nav>

    </footer>

</body>

</html>
